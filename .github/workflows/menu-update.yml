name: Menü Güncelle

on:
  schedule:
    - cron: '0 4 * * 1-5'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: node scripts/scrape.js
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          RESEND_KEY: ${{ secrets.RESEND_KEY }}
      - run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/data/menu.json
          git diff --staged --quiet || git commit -m "scraping: Günlük menü güncellemesi"
          git push
